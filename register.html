<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - TestPlatform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Шапка */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 20px 0;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            font-size: 28px;
            color: #2d3e50;
        }

        .logo span {
            color: #4a6ee0;
        }

        .back-link {
            color: #4a6ee0;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #3a5bc7;
        }

        /* Основной контент */
        .auth-container {
            padding: 60px 0;
        }

        .auth-card {
            background-color: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 32px;
            color: #2d3e50;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #666;
            font-size: 16px;
        }

        /* Переключение между входом и регистрацией */
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background-color: #f0f4ff;
            padding: 5px;
            border-radius: 50px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 16px;
        }

        .auth-tab.active {
            background-color: #4a6ee0;
            color: white;
            box-shadow: 0 5px 15px rgba(74, 110, 224, 0.3);
        }

        .auth-tab:not(.active):hover {
            background-color: #e6e9ff;
        }

        /* Формы */
        .auth-form {
            display: block;
        }

        .auth-form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3e50;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background-color: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #4a6ee0;
            box-shadow: 0 0 0 3px rgba(74, 110, 224, 0.1);
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-help {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .form-help i {
            color: #4a6ee0;
            font-size: 14px;
        }

        /* Чекбокс */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            cursor: pointer;
        }

        /* Кнопки */
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            font-size: 16px;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a6ee0 0%, #3a5bc7 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(74, 110, 224, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 110, 224, 0.4);
        }

        .btn-outline {
            border: 2px solid #4a6ee0;
            color: #4a6ee0;
            background-color: transparent;
        }

        .btn-outline:hover {
            background-color: #4a6ee0;
            color: white;
        }

        /* Разделитель */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }

        /* Быстрые ссылки */
        .quick-links {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .quick-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
            cursor: pointer;
        }

        .quick-links a:hover {
            color: #4a6ee0;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            color: #999;
            font-size: 13px;
        }

        .footer-links a {
            color: #999;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }

        .footer-links a:hover {
            color: #4a6ee0;
        }

        /* Уведомления */
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.4s;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h3 {
            font-size: 24px;
            color: #2d3e50;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e74c3c;
        }

        .modal-body {
            color: #555;
            line-height: 1.6;
        }

        .modal-body p {
            margin-bottom: 15px;
        }

        .modal-body h4 {
            color: #4a6ee0;
            margin: 20px 0 10px;
        }

        .modal-body ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .modal-body li {
            margin-bottom: 8px;
        }

        .modal-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            text-align: right;
        }

        .btn-modal {
            padding: 10px 25px;
            background-color: #4a6ee0;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn-modal:hover {
            background-color: #3a5bc7;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            
            .auth-card {
                padding: 25px 20px;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }

            .quick-links {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            
            .footer-links {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Test<span>Platform</span></h1>
                </div>
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> На главную
                </a>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="auth-container">
        <div class="container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Панель преподавателя</h2>
                    <p>Войдите или зарегистрируйтесь для доступа</p>
                </div>

                <!-- Контейнер для уведомлений -->
                <div id="alertContainer"></div>

                <!-- Переключение между входом и регистрацией -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
                    <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
                </div>

                <!-- Форма входа -->
                <div id="loginForm" class="auth-form">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginEmail">Email <span class="required">*</span></label>
                            <input 
                                type="email" 
                                id="loginEmail" 
                                class="form-control" 
                                placeholder="teacher@example.com"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Пароль <span class="required">*</span></label>
                            <input 
                                type="password" 
                                id="loginPassword" 
                                class="form-control" 
                                placeholder="••••••••"
                                required
                            >
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="rememberMe">
                            <label for="rememberMe">Запомнить меня</label>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" onclick="goBack()">Назад</button>
                            <button type="submit" class="btn btn-primary">
                                Войти <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </form>

                    <div class="divider">
                        <span>или</span>
                    </div>

                    <div style="text-align: center;">
                        <a href="#" onclick="switchTab('register'); return false;" style="color: #4a6ee0; text-decoration: none;">
                            Нет аккаунта? Зарегистрируйтесь
                        </a>
                    </div>
                </div>

                <!-- Форма регистрации -->
                <div id="registerForm" class="auth-form hidden">
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label for="registerName">Ваше имя <span class="required">*</span></label>
                            <input 
                                type="text" 
                                id="registerName" 
                                class="form-control" 
                                placeholder="Иван Петрович"
                                required
                            >
                            <div class="form-help">
                                <i class="fas fa-info-circle"></i>
                                Укажите ваше полное имя
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="registerEmail">Email <span class="required">*</span></label>
                            <input 
                                type="email" 
                                id="registerEmail" 
                                class="form-control" 
                                placeholder="teacher@example.com"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="registerPassword">Пароль <span class="required">*</span></label>
                            <input 
                                type="password" 
                                id="registerPassword" 
                                class="form-control" 
                                placeholder="Придумайте пароль (мин. 6 символов)"
                                required
                                minlength="6"
                            >
                        </div>

                        <div class="form-group">
                            <label for="registerConfirmPassword">Подтверждение пароля <span class="required">*</span></label>
                            <input 
                                type="password" 
                                id="registerConfirmPassword" 
                                class="form-control" 
                                placeholder="Повторите пароль"
                                required
                            >
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="agreeTerms" required>
                            <label for="agreeTerms">
                                Я принимаю <a href="#" style="color: #4a6ee0;">условия использования</a> и 
                                <a href="#" style="color: #4a6ee0;">политику конфиденциальности</a>
                            </label>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" onclick="goBack()">Назад</button>
                            <button type="submit" class="btn btn-primary">
                                Зарегистрироваться <i class="fas fa-user-plus"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Быстрые ссылки -->
                <div class="quick-links">
                    <a onclick="openModal('help')"><i class="fas fa-question-circle"></i> Помощь</a>
                    <a onclick="openModal('forgot')"><i class="fas fa-lock"></i> Забыли пароль?</a>
                    <a onclick="openModal('support')"><i class="fas fa-envelope"></i> Поддержка</a>
                </div>

                <div class="footer-links">
                    <a onclick="openModal('about')">О платформе</a>
                    <a onclick="openModal('privacy')">Конфиденциальность</a>
                    <a onclick="openModal('contacts')">Контакты</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Информация</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <p>Содержимое...</p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal" onclick="closeModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script>

            contacts: {

            }

        // Открыть модальное окно
        function openModal(type) {
            const modal = document.getElementById('infoModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            const content = modalContent[type];
            if (content) {
                modalTitle.textContent = content.title;
                modalBody.innerHTML = content.body;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        // Закрыть модальное окно
        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Закрытие по клику вне окна
        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Переключение между вкладками
        function switchTab(tab) {
            const loginTab = document.querySelectorAll('.auth-tab')[0];
            const registerTab = document.querySelectorAll('.auth-tab')[1];
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        // Показать уведомление
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'error') icon = 'exclamation-circle';
            
            alertDiv.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <span>${message}</span>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Обработка входа
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                showAlert('Пожалуйста, заполните все поля', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                showAlert(`Добро пожаловать, ${user.name}!`, 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showAlert('Неверный email или пароль', 'error');
            }
        }

        // Обработка регистрации
        function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            if (!name || !email || !password || !confirmPassword) {
                showAlert('Пожалуйста, заполните все обязательные поля', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Пароли не совпадают', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('Пароль должен быть не менее 6 символов', 'error');
                return;
            }

            if (!agreeTerms) {
                showAlert('Необходимо принять условия использования', 'error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Введите корректный email', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const existingUser = users.find(u => u.email === email);

            if (existingUser) {
                showAlert('Пользователь с таким email уже существует', 'error');
                return;
            }

            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                password: password,
                registeredAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(newUser));

            showAlert(`Регистрация успешна! Добро пожаловать, ${name}!`, 'success');
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }

        // Возврат назад
        function goBack() {
            window.location.href = 'index.html';
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            switchTab('login');
        });
    </script>
