<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прохождение теста - вопросы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            background-color: rgba(255,255,255,0.95);
            padding: 20px 0;
            position: sticky;
            top: 0;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 28px;
            color: #2d3e50;
        }
        .logo span { color: #4a6ee0; }
        .timer {
            background: #4a6ee0;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
        }
        .question-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            margin: 40px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .question-number {
            background: #f0f4ff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #4a6ee0;
        }
        .question-points {
            background: #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        .question-text {
            font-size: 24px;
            color: #2d3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .answer-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .answer-item.selected {
            background: #f0f4ff;
            border-color: #4a6ee0;
        }
        .answer-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 20px;
            cursor: pointer;
        }
        .answer-text {
            font-size: 18px;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        .btn {
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .btn-primary {
            background: #4a6ee0;
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #4a6ee0;
            color: #4a6ee0;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .progress-bar {
            background: white;
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .free-badge {
            background: #4CAF50;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 8px;
        }
        footer {
            background: #2d3e50;
            color: white;
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .question-card { padding: 25px; }
            .question-text { font-size: 20px; }
            .navigation { flex-direction: column; gap: 15px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Test<span>Platform</span> <span class="free-badge">БЕСПЛАТНО</span></h1>
                </div>
                <div class="timer" id="timer"><i class="fas fa-clock"></i> <span id="timeDisplay">--:--</span></div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="progress-bar">
                <span id="questionProgress">Вопрос 1 из 1</span>
                <span>Отвечено: <strong id="answeredCount">0</strong> из <span id="totalQuestions">1</span></span>
            </div>
            <div id="questionsContainer"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 TestPlatform</p>
        </div>
    </footer>

    <script>
        let currentTest = null;
        let currentIndex = 0;
        let userAnswers = [];
        let timerInterval = null;
        let timeLeft = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const testAttempt = JSON.parse(sessionStorage.getItem('currentTestAttempt') || '{}');
            if (!testAttempt.testId) {
                alert('Ошибка: данные теста не найдены');
                window.location.href = 'dashboard.html';
                return;
            }
            currentTest = testAttempt;
            userAnswers = new Array(currentTest.questions.length).fill(null);
            document.getElementById('totalQuestions').textContent = currentTest.questions.length;
            loadQuestion(0);
            
            if (currentTest.timeLimit) {
                timeLeft = currentTest.timeLimit * 60;
                startTimer();
            } else {
                document.getElementById('timer').style.display = 'none';
            }
        });

        function loadQuestion(index) {
            currentIndex = index;
            const q = currentTest.questions[index];
            document.getElementById('questionProgress').textContent = `Вопрос ${index+1} из ${currentTest.questions.length}`;
            updateAnsweredCount();
            
            let answersHtml = '';
            if (q.type !== 'text' && q.answers) {
                q.answers.forEach((answer, i) => {
                    const isChecked = userAnswers[index] === i;
                    answersHtml += `
                        <label class="answer-item ${isChecked ? 'selected' : ''}" onclick="selectAnswer(${index}, ${i})">
                            <input type="radio" name="question" class="answer-checkbox" ${isChecked ? 'checked' : ''}>
                            <span class="answer-text">${escapeHtml(answer.text)}</span>
                        </label>
                    `;
                });
            }
            
            let navHtml = `
                <div class="navigation">
                    ${index > 0 ? '<button class="btn btn-outline" onclick="prevQuestion()"><i class="fas fa-arrow-left"></i> Назад</button>' : '<div></div>'}
                    <button class="btn btn-primary" onclick="nextQuestion()">Далее <i class="fas fa-arrow-right"></i></button>
                </div>
            `;
            
            if (index === currentTest.questions.length - 1) {
                navHtml = `
                    <div class="navigation">
                        ${index > 0 ? '<button class="btn btn-outline" onclick="prevQuestion()">Назад</button>' : '<div></div>'}
                        <button class="btn btn-danger" onclick="finishTest()"><i class="fas fa-check-circle"></i> Завершить тест</button>
                    </div>
                `;
            }
            
            document.getElementById('questionsContainer').innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">Вопрос ${index+1}</span>
                        <span class="question-points">${q.points || 1} балл</span>
                    </div>
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="answers">${answersHtml}</div>
                    ${navHtml}
                </div>
            `;
        }
        
        function selectAnswer(questionIndex, answerIndex) {
            userAnswers[questionIndex] = answerIndex;
            updateAnsweredCount();
            const items = document.querySelectorAll('.answer-item');
            items.forEach((item, i) => {
                if (i === answerIndex) {
                    item.classList.add('selected');
                    item.querySelector('.answer-checkbox').checked = true;
                } else {
                    item.classList.remove('selected');
                    item.querySelector('.answer-checkbox').checked = false;
                }
            });
        }
        
        function updateAnsweredCount() {
            const answered = userAnswers.filter(a => a !== null).length;
            document.getElementById('answeredCount').textContent = answered;
        }
        
        function nextQuestion() {
            if (currentIndex < currentTest.questions.length - 1) {
                loadQuestion(currentIndex + 1);
            }
        }
        
        function prevQuestion() {
            if (currentIndex > 0) {
                loadQuestion(currentIndex - 1);
            }
        }
        
        function finishTest() {
            if (timerInterval) clearInterval(timerInterval);
            
            let correctCount = 0;
            let earnedPoints = 0;
            let totalPoints = 0;
            
            currentTest.questions.forEach((q, idx) => {
                totalPoints += q.points || 1;
                const userAnswer = userAnswers[idx];
                if (q.type !== 'text' && q.answers) {
                    const correctIndex = q.answers.findIndex(a => a.isCorrect);
                    if (userAnswer === correctIndex) {
                        correctCount++;
                        earnedPoints += q.points || 1;
                    }
                }
            });
            
            const percentage = totalPoints > 0 ? Math.round((earnedPoints / totalPoints) * 100) : 0;
            
            const result = {
                id: Date.now().toString(),
                testId: currentTest.testId,
                testTitle: currentTest.testTitle,
                studentName: currentTest.studentName,
                studentEmail: currentTest.studentEmail,
                startTime: currentTest.startTime,
                endTime: new Date().toISOString(),
                results: {
                    totalQuestions: currentTest.questions.length,
                    correctAnswers: correctCount,
                    totalPoints: totalPoints,
                    earnedPoints: earnedPoints,
                    percentage: percentage
                },
                status: 'completed'
            };
            
            const allResults = JSON.parse(localStorage.getItem('test_results') || '[]');
            allResults.push(result);
            localStorage.setItem('test_results', JSON.stringify(allResults));
            
            window.location.href = `test-result.html?score=${percentage}&correct=${correctCount}&total=${currentTest.questions.length}&student=${encodeURIComponent(currentTest.studentName)}`;
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('Время вышло!');
                    finishTest();
                    return;
                }
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timeDisplay').textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }, 1000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
    </script>
</body>
</html>
