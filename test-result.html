<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты теста - TestPlatform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background-color: rgba(255,255,255,0.95);
            padding: 20px 0;
        }

        .header-content {
            display: flex;
            justify-content: center;
        }

        .logo h1 {
            font-size: 28px;
            color: #2d3e50;
        }

        .logo span { color: #4a6ee0; }

        .result-card {
            background: white;
            border-radius: 32px;
            padding: 50px 40px;
            margin: 60px 0;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }

        .result-icon.success { color: #4CAF50; }
        .result-icon.warning { color: #ffc107; }
        .result-icon.danger { color: #e74c3c; }

        .greeting {
            font-size: 32px;
            font-weight: 700;
            color: #2d3e50;
            margin-bottom: 15px;
        }

        .student-name {
            font-size: 24px;
            color: #4a6ee0;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .score-percent {
            font-size: 72px;
            font-weight: 700;
            color: #2d3e50;
            margin: 30px 0;
        }

        .score-message {
            font-size: 28px;
            font-weight: 700;
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .score-message.excellent { background: #4CAF50; color: white; }
        .score-message.good { background: #2196F3; color: white; }
        .score-message.average { background: #ff9800; color: white; }
        .score-message.poor { background: #e74c3c; color: white; }

        .score-details {
            background: #f8f9ff;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
        }

        .score-stats {
            display: flex;
            justify-content: space-around;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #2d3e50;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #4a6ee0;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #3a5bc7;
            transform: translateY(-2px);
        }

        footer {
            background: #2d3e50;
            color: white;
            padding: 30px 0;
            text-align: center;
        }

        .free-badge {
            background: #4CAF50;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .result-card { padding: 30px 20px; }
            .greeting { font-size: 28px; }
            .score-percent { font-size: 48px; }
            .score-message { font-size: 22px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Test<span>Platform</span> <span class="free-badge">БЕСПЛАТНО</span></h1>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="result-card" id="resultCard"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 TestPlatform. Бесплатная платформа для онлайн-тестирования.</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const score = parseInt(urlParams.get('score') || '0');
        const correct = parseInt(urlParams.get('correct') || '0');
        const total = parseInt(urlParams.get('total') || '1');
        const studentName = decodeURIComponent(urlParams.get('student') || 'Студент');

        document.addEventListener('DOMContentLoaded', function() {
            let iconClass = 'success';
            let iconHtml = '<i class="fas fa-trophy"></i>';
            let messageClass = 'excellent';
            let messageText = 'Отлично!';
            
            if (score >= 80) {
                iconClass = 'success';
                iconHtml = '<i class="fas fa-trophy"></i>';
                messageClass = 'excellent';
                messageText = 'Отлично!';
            } else if (score >= 60) {
                iconClass = 'success';
                iconHtml = '<i class="fas fa-smile"></i>';
                messageClass = 'good';
                messageText = 'Хороший результат!';
            } else if (score >= 40) {
                iconClass = 'warning';
                iconHtml = '<i class="fas fa-meh"></i>';
                messageClass = 'average';
                messageText = 'Неплохо, но есть над чем работать';
            } else {
                iconClass = 'danger';
                iconHtml = '<i class="fas fa-frown"></i>';
                messageClass = 'poor';
                messageText = 'Нужно повторить материал';
            }
            
            document.getElementById('resultCard').innerHTML = `
                <div class="result-icon ${iconClass}">${iconHtml}</div>
                <h1 class="greeting">Тест завершен!</h1>
                <div class="student-name">${escapeHtml(studentName)}, спасибо за прохождение</div>
                <div class="score-percent">${score}%</div>
                <div class="score-message ${messageClass}">${messageText}</div>
                <div class="score-details">
                    <div class="score-stats">
                        <div>
                            <div class="stat-value">${correct}</div>
                            <div>правильных ответов</div>
                        </div>
                        <div>
                            <div class="stat-value">${total}</div>
                            <div>всего вопросов</div>
                        </div>
                    </div>
                </div>
                <a href="dashboard.html" class="btn"><i class="fas fa-arrow-left"></i> Вернуться на главную</a>
            `;
        });
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
